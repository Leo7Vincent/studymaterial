 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<div class="notice">🚧 This site is still under construction 🚧</div>
  <title>Choose a Subject</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f8ff;
      text-align: center;
      padding: 40px;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .subject-btn {
      background-color: #4caf50;
      color: white;
      padding: 12px 24px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.2s ease;
    }

    .subject-btn:hover {
      transform: scale(1.05);
      background-color: #388e3c;
    }
  </style>
</head>
<body>

  <h2>📘 Choose a Subject</h2>
  <div id="subjectButtons"></div>

  <script>
    const selectedClass = localStorage.getItem("selectedClass");
    const container = document.getElementById("subjectButtons");

    const subjectsByClass = {
      "6": ["Maths", "Physics", "Chemistry", "Biology" , "History & Civics" , "Geography" , "Computers"],
      "7": ["Maths", "Physics", "Chemistry", "Biology" , "History & Civics" , "Geography" , "Computers"],
      "8": ["Maths", "Physics", "Chemistry", "Biology" , "History & Civics" , "Geography" , "Computers"],
      "9": ["Maths", "Physics", "Chemistry", "Biology" , "History & Civics" , "Geography" , "Computers"],
      "10": ["Maths", "Physics", "Chemistry", "Biology" , "History & Civics" , "Geography" , "Computer Application"]
    };

    if (selectedClass && subjectsByClass[selectedClass]) {
      subjectsByClass[selectedClass].forEach(subject => {
        const btn = document.createElement("button");
        btn.textContent = subject;
        btn.className = "subject-btn";
        btn.onclick = () => {
          localStorage.setItem("selectedSubject", subject);
          window.location.href = "resources.html";
        };
        container.appendChild(btn);
      });
    } else {
      container.innerHTML = "<p>⚠️ Class not selected. Please <a href='index.html'>go back to home</a>.</p>";
    }
  </script>

</body>
</html>
