<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Select Resource</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
    }

    h2 {
      margin-bottom: 30px;
    }

    .card-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
    }

    .study-card {
      border-radius: 1em;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      background: #fff;
      width: 260px;
      height: 160px;
      padding: 30px;
      position: relative;
      overflow: hidden;
      transition: transform 0.4s ease;
      cursor: pointer;
    }

    .study-card:hover {
      transform: scale(1.05);
    }

    .study-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      border-radius: 0 0 1em 1em;
      width: 100%;
      height: 50%;
      transform-origin: center top;
      transform: rotateX(180deg);
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.1) 50%, rgba(0, 0, 0, 0.4));
      transition: transform 0.7s ease-in-out;
      z-index: -1;
    }

    .study-card:hover::before {
      transform: rotateX(0deg);
    }

    .study-card h3 {
      margin-top: 0;
      color: #333;
    }

    .study-card p {
      color: #666;
    }

    .back-btn {
      margin-top: 40px;
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .back-btn:hover {
      background: #388e3c;
    }

    .btn {
      padding: 12px 24px;
      margin: 10px;
      font-size: 18px;
      background: #ffb74d;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .btn:hover {
      background: #fb8c00;
    }

    .disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .book-btn {
      background: #4db6ac;
    }

    .book-btn:hover {
      background: #00796b;
    }
  </style>
</head>
<body>
  
  <h2>📚 Choose a Resource</h2>
  <div id="resourceButtons"></div>
  <div id="bookButtons" style="margin-top:30px;"></div>

  <script>
    const selectedClass = localStorage.getItem("selectedClass");
    const selectedSubject = localStorage.getItem("selectedSubject");

    if (!selectedClass || !selectedSubject) {
      document.body.innerHTML = "<h2>Class or Subject not selected. Please go back and choose again.</h2>";
      throw new Error("Missing class or subject");
    }

    const resourceContainer = document.getElementById("resourceButtons");
    const bookContainer = document.getElementById("bookButtons");

    const resourceTypes = [
      { label: "Textbook Solutions", value: "solutions" },
      { label: "Notes", value: "notes" },
      { label: "PYQ's", value: "pyqs" }
    ];

    const booksByClassSubject = {
      "6-chemistry": ["Selina", "Viraf Dalal"],
      "6-history and civics": ["Focus", "The Trail", "Effective"],
      "6-geography": ["Voyage", "Veena Bhargava"],
      "7-chemistry": ["Selina", "Viraf Dalal"],
      "7-biology": ["Selina", "Living Science"],
      "7-geography": ["Voyage", "Veena Bhargava", "Around the world"],
      "7-history and civics": ["Effective", "The Trail", "Focus", "New Combined Textbook"],
      "8-chemistry": ["Selina", "Dalal"],
      "8-biology": ["Selina", "Living Science"],
      "8-maths": ["Selina", "ML Aggrawal"],
      "8-computers": ["APC Understanding", "Logix Kips"],
      "8-geography": ["Total Geography", "Veena Bhargava", "Around the world"],
      "9-maths": ["Selina", "MS Aggrawal", "Frank"],
      "9-biology": ["Selina", "Frank"],
      "9-chemistry": ["Selina", "Frank"],
      "9-physics": ["Selina", "Frank"],
      "9-geography": ["Total Geography", "Veena Bhargava"],
      "9-computer application": ["APC Understanding", "Logix Kips"],
      "10-chemistry": ["Selina", "Viraf Dalal"],
      "10-maths": ["Selina", "MS Aggrawal"]
    };

    function showBooks(subjectKey, resourceType) {
      const books = booksByClassSubject[subjectKey];
      bookContainer.innerHTML = "";

      if (!books || resourceType !== "solutions") return;

      books.forEach(book => {
        const bookBtn = document.createElement("button");
        bookBtn.className = "btn book-btn";
        bookBtn.textContent = book + " Solutions";
        bookBtn.onclick = () => {
          const subjectFile = selectedSubject.toLowerCase().replace(/\s+/g, '');
          const bookFile = book.toLowerCase().replace(/\s+/g, '');
          const url = `materials/${selectedClass}/${subjectFile}-${resourceType}-${bookFile}.html`;
          window.location.href = url;
        };
        bookContainer.appendChild(bookBtn);
      });
    }

    resourceTypes.forEach(resource => {
      const btn = document.createElement("button");
      btn.textContent = resource.label;
      btn.className = "btn";

      if (resource.value === "pyqs" && selectedClass !== "10") {
        btn.disabled = true;
        btn.classList.add("disabled");
      } else {
        btn.onclick = () => {
          const subjectKey = `${selectedClass}-${selectedSubject.toLowerCase()}`;

          if (resource.value === "solutions" && booksByClassSubject[subjectKey]) {
            showBooks(subjectKey, resource.value);
          } else {
            const subjectFile = selectedSubject.toLowerCase().replace(/\s+/g, '');
            const url = `materials/${selectedClass}/${subjectFile}-${resource.value}.html`;
            window.location.href = url;
          }
        };
      }

      resourceContainer.appendChild(btn);
    });
  </script>
</body>
</html>
