<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Select Subject</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e8f5e9;
      padding: 40px;
      text-align: center;
    }

    h2 {
      margin-bottom: 30px;
    }

    .subject-btn {
      padding: 12px 24px;
      margin: 10px;
      font-size: 16px;
      background-color: #66bb6a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .subject-btn:hover {
      background-color: #388e3c;
    }
  </style>
</head>
<body>

  <h2>📘 Choose a Subject</h2>
  <div id="subjectContainer"></div>

  <script>
    const selectedClass = localStorage.getItem("selectedClass");
    const subjectContainer = document.getElementById("subjectContainer");

    const subjectsByClass = {
      "6": [ "Maths", "Physics", "Chemistry", "Biology" , "History & Civics" , "Geography" , "Computers"],
      "7": ["Maths", "Physics", "Chemistry", "Biology" , "History & Civics" , "Geography" , "Computers"],
      "8": ["Maths", "Physics", "Chemistry", "Biology" , "History & Civics" , "Geography" , "Computers"],
      "9": ["Maths", "Physics", "Chemistry", "Biology" , "History & Civics" , "Geography" , "Computers"],
      "10": ["Maths", "Physics", "Chemistry", "Biology" , "History & Civics" , "Geography" , "Computers"]
    };

    if (selectedClass && subjectsByClass[selectedClass]) {
      subjectsByClass[selectedClass].forEach(subject => {
        const btn = document.createElement("button");
        btn.className = "subject-btn";
        btn.textContent = subject;
        btn.addEventListener("click", () => {
          localStorage.setItem("selectedSubject", subject);
          window.location.href = "resources.html";
        });
        subjectContainer.appendChild(btn);
      });
    } else {
      subjectContainer.innerHTML = "<p>Please select a class first.</p>";
    }
  </script>

</body>
</html>
