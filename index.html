<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <div class="notice">🚧 This site is still under construction 🚧</div>
  <title>Select Class</title>
  <style>
    body {
      background: #f9fbe7;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      transition: all 0.5s ease;
    }

    h2 {
      margin-bottom: 20px;
    }

    select {
      padding: 10px 20px;
      font-size: 18px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h2>🎓 Choose Your Class</h2>
  <select id="classSelector">
    <option value="">-- Select Class --</option>
    <option value="6">Class 6</option>
    <option value="7">Class 7</option>
    <option value="8">Class 8</option>
    <option value="9">Class 9</option>
    <option value="10">Class 10</option>
  </select>

  <script>
    document.getElementById('classSelector').addEventListener('change', function () {
      const selectedClass = this.value;
      if (selectedClass) {
        localStorage.setItem("selectedClass", selectedClass);
        window.location.href = "subject.html";
      }
    });
  </script>
  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animated Background</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: linear-gradient(to bottom right, #e3f2fd, #fff3e0);
    }

    .animated-bg {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    .shape {
      position: absolute;
      bottom: -100px;
      width: 60px;
      height: 60px;
      opacity: 0.7;
      animation: floatUp 10s linear infinite;
    }

    .shape.book {
      background: url('https://cdn-icons-png.flaticon.com/512/29/29302.png') no-repeat center/contain;
    }

    .shape.cube {
      background: url('https://cdn-icons-png.flaticon.com/512/1178/1178479.png') no-repeat center/contain;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.7;
      }
      100% {
        transform: translateY(-120vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<div class="animated-bg">
  <!-- Floating Books -->
  <div class="shape book" style="left: 5%; animation-delay: 0s;"></div>
  <div class="shape book" style="left: 30%; animation-delay: 3s;"></div>

  <!-- Floating Cubes -->
  <div class="shape cube" style="left: 60%; animation-delay: 6s;"></div>
  <div class="shape cube" style="left: 80%; animation-delay: 1.5s;"></div>
</div>
</body>
</html>

</body>
</html>
