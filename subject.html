<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choose a Subject</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f8ff;
      text-align: center;
      padding: 40px;
      margin: 0;
      overflow: hidden;
    }

    .notice {
      background-color: #ffeb3b;
      padding: 10px;
      font-weight: bold;
      font-size: 18px;
    }

    h2 {
      font-size: 24px;
      margin-top: 30px;
      z-index: 1;
    }

    .subject-btn {
      background-color: #4caf50;
      color: white;
      padding: 12px 24px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.2s ease;
      z-index: 1;
      position: relative;
    }

    .subject-btn:hover {
      transform: scale(1.05);
      background-color: #388e3c;
    }

    /* Floating emoji background */
    .emoji-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .floating-emoji {
      position: absolute;
      font-size: 32px;
      opacity: 0.7;
      animation: floatUp 10s linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(-120px) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="notice">🚧 This site is still under construction 🚧</div>

  <h2>📘 Choose a Subject</h2>
  <div id="subjectButtons"></div>

  <div class="emoji-bg" id="emojiBackground"></div>

  <script>
    const selectedClass = localStorage.getItem("selectedClass");
    const container = document.getElementById("subjectButtons");

    const subjectsByClass = {
      "6": ["Maths", "Physics", "Chemistry", "Biology", "History and Civics", "Geography", "Computers"],
      "7": ["Maths", "Physics", "Chemistry", "Biology", "History and Civics", "Geography", "Computers"],
      "8": ["Maths", "Physics", "Chemistry", "Biology", "History and Civics", "Geography", "Computers"],
      "9": ["Maths", "Physics", "Chemistry", "Biology", "History and Civics", "Geography", "Computer Application"],
      "10": ["Maths", "Physics", "Chemistry", "Biology", "History and Civics", "Geography", "Computer Application"]
    };

    if (selectedClass && subjectsByClass[selectedClass]) {
      subjectsByClass[selectedClass].forEach(subject => {
        const btn = document.createElement("button");
        btn.textContent = subject;
        btn.className = "subject-btn";
        btn.onclick = () => {
          localStorage.setItem("selectedSubject", subject);
          window.location.href = "resources.html";
        };
        container.appendChild(btn);
      });
    } else {
      container.innerHTML = "<p>⚠️ Class not selected. Please <a href='index.html'>go back to home</a>.</p>";
    }

    // Floating emoji animation
    const emojiContainer = document.getElementById("emojiBackground");
    const emojis = ["📚", "📖", "✏️", "🖥️", "💻", "📝", "📐", "📊", "📅"];

    function createFloatingEmoji() {
      const emoji = document.createElement("div");
      emoji.className = "floating-emoji";
      emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      emoji.style.left = Math.random() * 100 + "vw";
      emoji.style.animationDelay = Math.random() * 10 + "s";
      emoji.style.fontSize = (24 + Math.random() * 24) + "px";

      emojiContainer.appendChild(emoji);

      setTimeout(() => {
        emoji.remove();
      }, 11000); // remove after 11 seconds
    }

    setInterval(createFloatingEmoji, 800);
  </script>

</body>
</html>
