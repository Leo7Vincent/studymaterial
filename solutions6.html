<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Class 6 Textbook Solutions</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    h2 {
      margin-bottom: 30px;
    }

    .card-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
    }

    .study-card {
      border-radius: 1em;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      background: #fff;
      width: 260px;
      height: 160px;
      padding: 30px;
      position: relative;
      overflow: hidden;
      transition: transform 0.4s ease;
      cursor: pointer;
    }

    .study-card:hover {
      transform: scale(1.05);
    }

    .study-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      border-radius: 0 0 1em 1em;
      width: 100%;
      height: 50%;
      transform-origin: center top;
      transform: rotateX(180deg);
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.1) 50%, rgba(0, 0, 0, 0.4));
      transition: transform 0.7s ease-in-out;
      z-index: -1;
    }

    .study-card:hover::before {
      transform: rotateX(0deg);
    }

    .study-card h3 {
      margin-top: 0;
      color: #333;
    }

    .study-card p {
      color: #666;
    }

    .back-btn {
      margin-top: 40px;
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .back-btn:hover {
      background: #388e3c;
    }
  </style>
</head>
<body>

  <h2>Class 6 Solutions</h2>
  <div class="card-container">
    
    <div class="study-card" onclick="window.location.href='ICSE6_L1GEO.docx'">
      <h3>Selina Geography</h3>
      <p>Lesson 1 – Geography</p>
    </div>

    <div class="study-card" onclick="window.location.href='ICSE6_SCIENCE_VEENA.docx'">
      <h3>Veena Bhargava</h3>
      <p>Science Solutions</p>
    </div>

    <div class="study-card" onclick="window.location.href='ICSE6th_BioL1.docx'">
      <h3>Selina Biology</h3>
      <p>Lesson 1 – Cell</p>
    </div>

  </div>

  <button class="back-btn" onclick="window.history.back()">⬅️ Go Back</button>

</body>
</html>
