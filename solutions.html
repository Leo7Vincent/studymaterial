<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fancy Study Card</title>
  <style>
    .study-card {
      border-radius: 1em;
      perspective: 600px;
      box-shadow:
        0 0.125em 0.3125em rgba(0, 0, 0, 0.25),
        0 0.02125em 0.06125em rgba(0, 0, 0, 0.25);
      position: relative;
      overflow: hidden;
      background: #fff;
      padding: 40px;
      width: 300px;
      height: 200px;
      margin: 50px auto;
      text-align: center;
    }

    .study-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      border-radius: 0 0 1em 1em;
      width: 100%;
      height: 50%;
      transform-origin: center top;
      transform: rotateX(180deg);
      background: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0.1) 50%,
        rgba(0, 0, 0, 0.4)
      );
      transition: transform 0.7s ease-in-out;
      z-index: -1;
    }

    .study-card:hover::before {
      transform: rotateX(0deg);
    }
  </style>
</head>
<body>
  <div class="study-card">
    <h3>Class 9 Chemistry</h3>
    <p>Selina Solutions, Notes & PYQs</p>
  </div>
</body>
</html>
