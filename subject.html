<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>📘 Choose a Subject</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e8f5e9;
      padding: 40px;
      text-align: center;
    }

    h2 {
      margin-bottom: 30px;
    }

    .subject-btn {
      padding: 12px 24px;
      margin: 10px;
      font-size: 16px;
      background-color: #66bb6a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .subject-btn:hover {
      background-color: #388e3c;
    }
  </style>
</head>
<body>

  <h2>📘 Choose a Subject</h2>
  <div id="subjectButtons"></div>

  <script>
    const selectedClass = localStorage.getItem("selectedClass");
    const container = document.getElementById("subjectButtons");

    const subjectsByClass = {
      "6": ["Maths", "Science", "English", "Social Studies"],
      "7": ["Maths", "Science", "Geography", "English Literature"],
      "8": ["Maths", "Physics", "Biology", "History"],
      "9": ["Maths", "Physics", "Chemistry", "Biology", "AI", "History", "Geography"],
      "10": ["Maths", "Physics", "Chemistry", "Biology", "Computer Applications", "Civics"]
    };

    if (selectedClass && subjectsByClass[selectedClass]) {
      subjectsByClass[selectedClass].forEach(subject => {
        const btn = document.createElement("button");
        btn.textContent = subject;
        btn.className = "subject-btn";
        btn.onclick = () => {
          localStorage.setItem("selectedSubject", subject);
          window.location.href = "resources.html";
        };
        container.appendChild(btn);
      });
    } else {
      container.innerHTML = "<p>⚠️ Class not selected. Please <a href='index.html'>go back to home</a>.</p>";
    }
  </script>

</body>
</html>
